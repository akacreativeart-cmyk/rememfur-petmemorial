<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Offline — Rememfur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05070f" />
    <link rel="icon" href="/icon-192.png" />
    <style>
      html,body{margin:0;height:100%;background:#05070f;color:#e6e1d6;font-family:'Cormorant Garamond',Georgia,serif;}
      body{display:grid;place-items:center;padding:2rem;padding-top:calc(2rem + env(safe-area-inset-top));padding-bottom:calc(2rem + env(safe-area-inset-bottom));}
      .card{max-width:22rem;text-align:center;}
      .flame{width:64px;height:80px;margin:0 auto 1.5rem;position:relative;}
      .flame::before{content:"";position:absolute;inset:12px 16px 0;border-radius:50% 50% 45% 45% / 60% 60% 40% 40%;background:radial-gradient(ellipse at 50% 70%,#fff2c8 0%,#f0a868 40%,#c25a2a 75%,transparent 100%);filter:blur(0.4px);animation:flick 2.4s ease-in-out infinite;box-shadow:0 0 40px #f0a86855;}
      .flame::after{content:"";position:absolute;left:50%;bottom:0;width:14px;height:14px;background:#0e1424;border-radius:2px;transform:translateX(-50%);box-shadow:0 -2px 0 #1a2238;}
      @keyframes flick{0%,100%{transform:scaleY(1) scaleX(1);}50%{transform:scaleY(1.06) scaleX(0.96);}}
      h1{font-weight:400;font-size:1.6rem;margin:0 0 0.5rem;color:#f5e6c8;}
      p{color:rgba(230,225,214,0.65);font-family:'Jost',system-ui,sans-serif;font-size:0.95rem;line-height:1.5;margin:0 0 1.5rem;}
      button{font:inherit;background:linear-gradient(#fcd34d,#f59e0b);color:#1a1200;border:0;border-radius:999px;padding:0.6rem 1.4rem;font-family:'Jost',system-ui,sans-serif;font-weight:500;cursor:pointer;}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="flame" aria-hidden="true"></div>
      <h1>You're offline</h1>
      <p>The candles will be here when you're back.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
